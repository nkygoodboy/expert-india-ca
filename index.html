<script>

function showInquiry(service){

document.getElementById(
'formSection'
).style.display='block';

document.getElementById(
'serviceName'
).value=service;

document.getElementById(
'formSection'
).scrollIntoView({
behavior:'smooth'
});

}



async function fileToBase64(file){

return new Promise((resolve,reject)=>{

const reader=new FileReader();

reader.readAsDataURL(file);

reader.onload=()=>{

resolve(
reader.result.split(',')[1]
);

};

reader.onerror=error=>reject(error);

});

}



document.getElementById(
'leadForm'
).addEventListener(
'submit',

async function(e){

e.preventDefault();

const submitBtn =
document.querySelector('.submit-btn');

submitBtn.innerHTML='Submitting...';

submitBtn.disabled=true;



const aadhaarFile =
document.getElementById('aadhaar').files[0];

const panFile =
document.getElementById('pan').files[0];

const paymentFile =
document.getElementById('payment').files[0];



const data={

name:document.getElementById(
'name'
).value,

mobile:document.getElementById(
'mobile'
).value,

email:document.getElementById(
'email'
).value,

service:document.getElementById(
'serviceName'
).value,

details:document.getElementById(
'message'
).value,

aadhaar:aadhaarFile
? await fileToBase64(aadhaarFile)
: "",

pan:panFile
? await fileToBase64(panFile)
: "",

extra:paymentFile
? await fileToBase64(paymentFile)
: ""

};



fetch(
'https://script.google.com/macros/s/AKfycbyHi8XT2J5E46L73xvjOhuDy_reF3fzG3wmtJFn3G3HzM2pRwYcAuv3C7Q8pUMeiyV9/exec',

{

method:'POST',

mode:'no-cors',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify(data)

}

)

.then(()=>{

alert(
'Inquiry Submitted Successfully ✅'
);

document.getElementById(
'leadForm'
).reset();

document.getElementById(
'formSection'
).style.display='none';

submitBtn.innerHTML='Submit Inquiry';

submitBtn.disabled=false;

document.getElementById(
'uploadStatus'
).innerHTML=
'Files Uploaded Successfully ✅';

})

.catch(()=>{

alert(
'Submission Error'
);

submitBtn.innerHTML='Submit Inquiry';

submitBtn.disabled=false;

});

}

);

</script>
