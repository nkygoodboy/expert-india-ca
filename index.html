<script>

function showInquiry(service){

document.getElementById('formSection').style.display='block';

document.getElementById('serviceName').value=service;

document.getElementById('formSection').scrollIntoView({
behavior:'smooth'
});

}

document.getElementById('leadForm')
.addEventListener('submit',function(e){

e.preventDefault();

const submitBtn =
document.querySelector('.submit-btn');

submitBtn.innerHTML='Submitting...';

submitBtn.disabled=true;

const data={

name:document.getElementById('name').value,

mobile:document.getElementById('mobile').value,

email:document.getElementById('email').value,

service:document.getElementById('serviceName').value,

details:document.getElementById('message').value

};

fetch(
'https://script.google.com/macros/s/AKfycbyHi8XT2J5E46L73xvjOhuDy_reF3fzG3wmtJFn3G3HzM2pRwYcAuv3C7Q8pUMeiyV9/exec',

{

method:'POST',

mode:'no-cors',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify(data)

}

)

.then(()=>{

alert('Inquiry Submitted Successfully ✅');

document.getElementById('leadForm').reset();

document.getElementById('formSection').style.display='none';

submitBtn.innerHTML='Submit Inquiry';

submitBtn.disabled=false;

})

.catch(()=>{

alert('Submission Error');

submitBtn.innerHTML='Submit Inquiry';

submitBtn.disabled=false;

});

});

</script>
