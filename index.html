<section class="inquiry-form" id="formSection">

<h2>Inquiry Form</h2>

<form id="leadForm">

<input type="text"
id="name"
placeholder="Your Name"
required>

<input type="tel"
id="mobile"
placeholder="Mobile Number"
required>

<select id="serviceName" required>

<option value="">
Select Service
</option>

<option value="GST Registration">
GST Registration
</option>

<option value="Income Tax Filing">
Income Tax Filing
</option>

<option value="MSME Registration">
MSME Registration
</option>

<option value="Company Registration">
Company Registration
</option>

</select>

<textarea
id="message"
placeholder="Enter Your Message">
</textarea>

<button type="submit">
Submit Inquiry
</button>

</form>

</section>

<style>

.inquiry-form{
display:none;
padding:20px;
background:white;
margin:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.inquiry-form h2{
font-size:34px;
margin-bottom:20px;
}

input,
select,
textarea{
width:100%;
padding:18px;
margin-top:15px;
font-size:20px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:16px 28px;
border-radius:12px;
font-size:22px;
cursor:pointer;
margin-top:15px;
width:100%;
}

button:hover{
background:#0056d6;
}

</style>

<script>

function showInquiry(service){

document.getElementById('formSection').style.display='block';

document.getElementById('serviceName').value=service;

document.getElementById('formSection').scrollIntoView({
behavior:'smooth'
});

}

document.getElementById("leadForm")
.addEventListener("submit", function(e){

e.preventDefault();

const formData = {

data: [

{

Name:
document.getElementById("name").value,

"Mobile number":
document.getElementById("mobile").value,

Service:
document.getElementById("serviceName").value,

Details:
document.getElementById("message").value,

Date:
new Date().toLocaleString()

}

]

};

fetch("https://sheetdb.io/api/v1/pjqy0ulsbv7ym", {

method: "POST",

headers: {
"Content-Type":"application/json"
},

body: JSON.stringify(formData)

})

.then(response => response.json())

.then(data => {

alert("Inquiry Submitted Successfully ✅");

document.getElementById("leadForm").reset();

})

.catch(error => {

alert("Error submitting form");

});

});

</script>
