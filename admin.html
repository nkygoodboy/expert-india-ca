<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
padding:20px;
}

h1{
text-align:center;
color:#005eff;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
margin:0;
font-size:45px;
color:#005eff;
}

.card p{
margin-top:10px;
font-size:18px;
}

iframe{
width:100%;
height:600px;
border:none;
border-radius:15px;
margin-top:20px;
background:white;
}

#searchInput{
width:100%;
padding:15px;
margin-top:20px;
border-radius:10px;
border:1px solid #ccc;
font-size:18px;
box-sizing:border-box;
}

</style>

</head>

<body>

<script>

const password = prompt(
'Enter Admin Password'
);

if(password !== 'expert123'){

document.body.innerHTML='';

alert('Access Denied');

window.location.href='/';

}

</script>

<h1>
Expert India CA Admin
</h1>

<input
type="text"
id="searchInput"
placeholder="Search Customer..."
>

<div class="stats">

<div class="card">
<h2 id="totalLeads">0</h2>
<p>Total Leads</p>
</div>

<div class="card">
<h2 id="pendingLeads">0</h2>
<p>Pending</p>
</div>

<div class="card">
<h2 id="paidLeads">0</h2>
<p>Paid</p>
</div>

<div class="card">
<h2 id="completedLeads">0</h2>
<p>Completed</p>
</div>

</div>

<iframe
id="sheetFrame"
src="https://docs.google.com/spreadsheets/d/1xVoVirgX3E40faJr19rqgVbxK-PioV2058jvt9GCOhs/edit?usp=sharing">
</iframe>

<script>

async function loadCounts(){

const response = await fetch(
'https://script.google.com/macros/s/AKfycbyHi8XT2J5E46L73xvjOhuDy_reF3fzG3wmtJFn3G3HzM2pRwYcAuv3C7Q8pUMeiyV9/exec'
);

const data = await response.json();

const total = data.length - 1;

document.getElementById(
'totalLeads'
).innerHTML = total;

document.getElementById(
'pendingLeads'
).innerHTML = total;

document.getElementById(
'paidLeads'
).innerHTML = 0;

document.getElementById(
'completedLeads'
).innerHTML = 0;

}

loadCounts();

setInterval(loadCounts,5000);

</script>
