<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
padding:20px;
}

h1{
text-align:center;
color:#005eff;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
margin:0;
font-size:35px;
color:#005eff;
}

.card p{
margin-top:10px;
font-size:18px;
}

iframe{
width:100%;
height:600px;
border:none;
border-radius:15px;
margin-top:20px;
background:white;
}

</style>

</head>

<body>

<h1>
Expert India CA Admin
</h1>

<div class="stats">

<div class="card">
<h2 id="totalLeads">0</h2>
<p>Total Leads</p>
</div>

<div class="card">
<h2 id="pendingLeads">0</h2>
<p>Pending</p>
</div>

<div class="card">
<h2 id="paidLeads">0</h2>
<p>Paid</p>
</div>

<div class="card">
<h2 id="completedLeads">0</h2>
<p>Completed</p>
</div>

</div>

<iframe
src="https://docs.google.com/spreadsheets/d/1xVoVirgX3E40faJr19rqgVbxK-PioV2058jvt9GCOhs/edit?usp=sharing">
</iframe>

<script>

document.getElementById(
'totalLeads'
).innerHTML='Live';

document.getElementById(
'pendingLeads'
).innerHTML='Pending';

document.getElementById(
'paidLeads'
).innerHTML='Paid';

document.getElementById(
'completedLeads'
).innerHTML='Done';

</script>

</body>

</html>
